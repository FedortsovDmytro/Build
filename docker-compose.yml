version: "3.9"

services:
  build-mysql:
    image: mysql:8.0
    container_name: build-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: build
    ports:
      - "3307:3306"
    volumes:
      - build_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  demo-app:
    build: .
    depends_on:
      build-mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://build-mysql:3306/build
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    ports:
      - "8080:8080"

volumes:
  build_mysql_data: